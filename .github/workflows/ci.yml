name: CI — Build & Release Gates

# Release-blocking quality gates for the Elasticsearch read-only MCP server (ADR-0003)
# and the OPA authorization policy (ADR-0001 §5):
#   - server-verify : mvn verify = unit tests + ArchUnit (A1–A7) + JaCoCo ≥90% line/branch
#                     + server-contract suite (QA-10) + Testcontainers ES adapter IT
#   - policy-gate   : opa check / fmt / test (deny-by-default + read-tier obligations)
#
# Conventions (shared with supply-chain.yml, per ADR-0002):
#   - every action pinned by FULL commit SHA, never a mutable tag                (§1)
#   - least-privilege GITHUB_TOKEN (default read)                                (§1, §4)
# Re-pinning an action SHA is a deliberate, reviewed change — see ./README.md.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-verify:
    name: Build, test & coverage gate (mvn verify)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up JDK 25 (Temurin) + Maven cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      # `mvn verify` runs surefire (unit + ArchUnit + server-contract) with the JaCoCo
      # ≥90% gate, then failsafe (Testcontainers ES adapter IT). ubuntu-latest ships a
      # Docker daemon, so the integration test runs; the pom pins the Docker API version
      # for it (api.version=1.40) to satisfy modern engines.
      - name: mvn verify (unit + ArchUnit + coverage gate + Testcontainers IT)
        run: mvn -B -ntp verify
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-report
          path: server/target/site/jacoco/
          if-no-files-found: warn

  policy-gate:
    name: OPA policy tests (deny-by-default + read-tier obligations)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # OPA is installed from a pinned release + verified checksum rather than a
    # third-party action — fewer trusted dependencies (ADR-0002 §1). Re-pin OPA_*
    # deliberately when upgrading (see ./README.md).
    env:
      OPA_VERSION: v1.17.0
      OPA_SHA256: e83da46804832578e9d9e1733dffbe4d3b5f8cc9c26eb124da9ceea4abfe189f
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install OPA (pinned + checksum-verified)
        run: |
          curl -sSL -o opa "https://openpolicyagent.org/downloads/${OPA_VERSION}/opa_linux_amd64_static"
          echo "${OPA_SHA256}  opa" | sha256sum -c -
          chmod +x opa && sudo mv opa /usr/local/bin/opa
      - name: opa check (compile)
        run: opa check policy/
      - name: opa fmt (style)
        run: opa fmt --fail policy/
      - name: opa test
        run: opa test policy/ -v
