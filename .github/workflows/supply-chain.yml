name: Supply Chain Security

# Embodies ADR-0002 (Software Supply Chain Security):
#   - every action pinned by FULL commit SHA, never a mutable tag      (§1)
#   - least-privilege GITHUB_TOKEN (default read; jobs opt into more)  (§1, §4)
#   - secret scanning (gitleaks)                                       (§4)
#   - dependency / filesystem vulnerability scanning (Trivy)           (§2, §3)
#   - SBOM generation (Trivy → CycloneDX)                              (§3)
#   - container image build + image vulnerability scan                 (§2)
#
# Re-pinning the action SHAs is a deliberate, reviewed change — see .github/workflows/README.md.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege by default (ADR-0002 §1/§4). Jobs widen scope only if they must.
permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history so gitleaks can scan all commits)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Organization accounts need a (free) GITLEAKS_LICENSE secret; personal/public repos do not.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  vuln-scan:
    name: Vulnerability scan (Trivy fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Trivy filesystem scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error

  image:
    name: Build & scan container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build hardened image
        run: docker build -f docker/Dockerfile -t mcp-elastic-search:ci .
      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: mcp-elastic-search:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

# NOTE: OPA policy tests and the server build/coverage gate live in the dedicated
# release-gates workflow — see ci.yml (`policy-gate` + `server-verify`). This
# workflow stays focused on supply-chain scanning (gitleaks/Trivy/SBOM/image).
