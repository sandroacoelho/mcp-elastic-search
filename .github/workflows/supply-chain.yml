name: Supply Chain Security

# Embodies ADR-0002 (Software Supply Chain Security):
#   - every action pinned by FULL commit SHA, never a mutable tag      (§1)
#   - least-privilege GITHUB_TOKEN (default read; jobs opt into more)  (§1, §4)
#   - secret scanning (gitleaks)                                       (§4)
#   - dependency / filesystem vulnerability scanning (Trivy)           (§2, §3)
#   - SBOM generation (Trivy → CycloneDX)                              (§3)
#   - container image build + image vulnerability scan                 (§2)
#
# Re-pinning the action SHAs is a deliberate, reviewed change — see .github/README.md.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege by default (ADR-0002 §1/§4). Jobs widen scope only if they must.
permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history so gitleaks can scan all commits)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Organization accounts need a (free) GITLEAKS_LICENSE secret; personal/public repos do not.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  vuln-scan:
    name: Vulnerability scan (Trivy fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Trivy filesystem scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error

  image:
    name: Build & scan container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build hardened reference image
        run: docker build -t secure-mcp-service:ci docker/
      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: secure-mcp-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

  policy-test:
    name: OPA policy tests (deny-by-default)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # OPA is installed from a pinned release + verified checksum rather than a
    # third-party action — fewer trusted dependencies (ADR-0002 §1). Re-pin OPA_*
    # deliberately when upgrading (see .github/README.md).
    env:
      OPA_VERSION: v1.17.0
      OPA_SHA256: e83da46804832578e9d9e1733dffbe4d3b5f8cc9c26eb124da9ceea4abfe189f
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install OPA (pinned + checksum-verified)
        run: |
          curl -sSL -o opa "https://openpolicyagent.org/downloads/${OPA_VERSION}/opa_linux_amd64_static"
          echo "${OPA_SHA256}  opa" | sha256sum -c -
          chmod +x opa && sudo mv opa /usr/local/bin/opa
      - name: opa check (compile)
        run: opa check policy/
      - name: opa fmt (style)
        run: opa fmt --fail policy/
      - name: opa test
        run: opa test policy/ -v
