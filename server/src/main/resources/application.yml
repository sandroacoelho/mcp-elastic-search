spring:
  application:
    name: mcp-elastic-search
  ai:
    mcp:
      server:
        name: mcp-elastic-search
        version: 0.1.0
        # Streamable HTTP / SSE — reachable ONLY from the platform gateway
        # (ADR-0001 §4 network-policy invariant). SSE stream is served at /elastic
        # (default would be /sse); clients POST messages to /elastic/message
        # (default would be /mcp/message).
        sse-endpoint: /elastic
        sse-message-endpoint: /elastic/message

server:
  port: 9090

# Actuator: expose ONLY health over HTTP (ADR-0001 §9 — minimal surface). The
# container HEALTHCHECK and k8s liveness/readiness probes hit /actuator/health.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true   # adds /actuator/health/{liveness,readiness}
      show-details: never

# Read-only Elasticsearch MCP server configuration (ADR-0003).
mcpes:
  connection:
    host: ${ES_HOST:https://localhost:9200}
    # Least-privilege API key (read + view_index_metadata on allowlisted indices only).
    api-key: ${ES_API_KEY:}
  # Logical name -> concrete index/alias. Only these are readable; everything else fails closed.
  allowlist:
    products: products-v1
    customers: customers-v3
  # Policy-approved _source fields per logical index. Requests for fields outside
  # these lists fail closed; an index without a list returns no _source fields.
  source-fields:
    products: [id, name, price]
    customers: [id, name, status]
  limits:
    default-page-size: 10
    max-page-size: 100
    max-result-window: 10000
    request-timeout-seconds: 10
    terminate-after: 10000

logging:
  level:
    ai.enterprise.mcp.elastic: INFO
